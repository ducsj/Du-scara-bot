name: Build ESP32 Drawing Robot Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: pip install platformio

    - name: Build Web Interface and Create Embedded Files
      run: python3 prebuild.py

    - name: Build ESP32 Firmware
      run: platformio run

    - name: List Built Files
      run: ls -la .pio/build/lolin_c3_mini/*.bin

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: esp32-drawing-robot-firmware
        path: |
          .pio/build/lolin_c3_mini/firmware.bin
        retention-days: 30